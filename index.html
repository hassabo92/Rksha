<body>

<audio id="adhanAudio" src="https://www.islamcan.com/common/adhan/adhan1.mp3" preload="auto"></audio>

<header>
    <h1>منصة أم ضوابان الإلكترونية<br><span style="font-size: 0.65em; opacity: 0.8; font-weight: 500;"></span></h1>
</header>

<div class="grid-container">

        <div class="icon">💸</div><span>سيولة وتحويل</span>
    </div>
    <div class="grid-item" onclick="showBloodDonation()">
        <div class="icon">🩸</div><span>تبرع بالدم</span>
    </div>
    <div class="grid-item" onclick="showPrayerTimes()">
        <div class="icon">🕌</div><span>مواقيت الصلاة</span>
    </div>
    <div class="grid-item" onclick="showRideRequest()">
        <div class="icon">🚕</div><span>طلب ركشه</span>

    function startAdhanChecker() {
        setInterval(() => {
            if (!prayerTimings) return;
            const now = new Date();
            const currentHourMin = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const prayers = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            for (let p of prayers) {
                if (prayerTimings[p] === currentHourMin && !adhanPlayed) {
                    const audio = document.getElementById('adhanAudio');
                    audio.play().catch(e => console.log("تفاعل مطلوب للمتصفح"));
                    adhanPlayed = true;
                    setTimeout(() => { adhanPlayed = false; }, 61000);
                }
            }
        }, 1000);
    }

    function toggleCustomAuthMode() {
        cIsLoginMode = !cIsLoginMode;
        document.getElementById('cAuthTitle').innerText = cIsLoginMode ? "تسجيل دخول المرضى 🔐" : "إنشاء حساب مريض جديد ✨";

    function checkCustomCachedUser() {
        const cached = localStorage.getItem('activePatientUser');
        if (cached) { loginCustomSuccess(cached); }
    }

    function handlePatientAuth(e) {
        e.preventDefault();
        const user = document.getElementById('cAuthUsername').value.trim().toLowerCase();
        const pass = document.getElementById('cAuthPassword').value;
        if(user.length < 3 || pass.length < 4) {
            showAlert("يرجى اختيار اسم مستعار لا يقل عن 3 أحرف وكلمة مرور لا تقل عن 4 رموز.", "warning");
            return;
        }
        injectFirebaseScripts(() => {
            const db = firebase.database();
            if (cIsLoginMode) {
                db.ref('users/' + user).once('value', snapshot => {
                    const userData = snapshot.val();
                    if(userData && userData.password === pass) { loginCustomSuccess(user); } 
                    else { showAlert("⚠️ الاسم المستعار أو كلمة المرور غير صحيحة!", "error"); }
                });
            } else {
                db.ref('users/' + user).once('value', snapshot => {
                    if(snapshot.exists()) { showAlert("⚠️ هذا الاسم المستعار محجوز مسبقاً! اختر اسماً آخر.", "warning"); } 
                    else {
                        db.ref('users/' + user).set({ username: user, password: pass }, err => {
                            if(!err) { showAlert("🎉 تم إنشاء حسابك المشفر بنجاح!", "success"); loginCustomSuccess(user); }
                        });
                    }
                });
            }
        });
    }

    function loginCustomSuccess(username) {
        cActiveUsername = username;
        localStorage.setItem('activePatientUser', username);
        const authBox = document.getElementById('patientAuthBox');
        const dashBox = document.getElementById('patientDashboardBox');
        if(authBox) authBox.style.display = 'none';
        if(dashBox) dashBox.style.display = 'block';
        listenToCustomPatientRequests();

    function handleCustomFileChange(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 500;
                    let width = img.width; let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    cCurrentUploadBase64 = canvas.toDataURL('image/jpeg', 0.4);
                    document.getElementById('cFileLabel').innerText = "✅ تم إرفاق صورة الروشتة بنجاح";
                };
            };
        }
    }

    function handlePatientSubmit(e) {
        e.preventDefault();
        if(!cActiveUsername) return;
        const submitBtn = document.getElementById('cSubmitBtn');
        submitBtn.innerText = "جاري رفع البيانات وتأمين الاتصال...";
        submitBtn.disabled = true;
        const requestId = Math.floor(Math.random() * 90000) + 10000;
        injectFirebaseScripts(() => {
            firebase.database().ref('requests/' + requestId).set({
                id: requestId,
                patientUser: cActiveUsername,
                type: document.getElementById('cRequestType').value,
                details: document.getElementById('cDetails').value,
                prescriptionBase64: cCurrentUploadBase64,
                timestamp: Date.now()
            }, error => {
                submitBtn.innerText = "إرسال الاستفسار للصيدليات";
                submitBtn.disabled = false;
                if (error) { showAlert("خطأ: " + error.message, "error"); } 
                else {
                    showAlert("تم إرسال استفسارك الدوائي بنجاح للصيدليات، يرجى متابعة الردود بالأسفل.", "success");
                    document.getElementById('cDetails').value = "";
                    document.getElementById('cPrescriptionFile').value = "";
                    document.getElementById('cFileLabel').innerText = "اضغط هنا لإرفاق صورة الروشتة 📷";
                    cCurrentUploadBase64 = "";
                }
            });
        });
    }

    function listenToCustomPatientRequests() {
        if(!cActiveUsername) return;
        injectFirebaseScripts(() => {
            firebase.database().ref('requests').on('value', snapshot => {
                const container = document.getElementById('cPatientStatusContainer');
                if(!container) return;
                const data = snapshot.val();
                cGlobalRequestsData = data || {};
                container.innerHTML = '';
                let foundAny = false;
                if(data) {
                    Object.keys(data).forEach(key => {
                        const req = data[key];
                        if(req.patientUser && req.patientUser === cActiveUsername) {
                            foundAny = true;
                            let hasReplies = req.replies && Object.keys(req.replies).length > 0;
                            let badgeClass = hasReplies ? 'replied' : 'pending';
                            let badgeText = hasReplies ? `تم تلقي ردود (${Object.keys(req.replies).length}) ✓` : 'قيد المراجعة ⏳';
                            container.innerHTML += `
                                <div class="ticket-card">
                                    <div style="cursor:pointer; flex-grow:1;" onclick="openCustomDetailsModal('${req.id}')">
                                        <strong style="font-size:13px; display:block;">📄 طلب: ${req.type}</strong>
                                        <span style="font-size:11px; color:#64748b;">التاريخ: ${new Date(req.timestamp).toLocaleDateString('ar-EG')}</span>
                                    </div>
                                    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:5px;">
                                        <span class="badge-custom ${badgeClass}">${badgeText}</span>
                                        <button class="btn-del-ticket" onclick="deleteCustomPatientRequest('${req.id}')">حذف 🗑️</button>
                                    </div>
                                </div>`;
                        }
                    });
                }
                if(!foundAny) { container.innerHTML = '<p style="text-align:center; color:#64748b; font-size:12px;">أرشيفك خالي حالياً. أرسل استفساراً جديداً للأدوية.</p>'; }
            });
        });
    }

    function deleteCustomPatientRequest(id) {
        if (confirm("هل أنت متأكد من حذف هذا الطلب نهائياً؟")) {
            firebase.database().ref('requests/' + id).remove().catch(error => showAlert("خطأ: " + error.message, "error"));
        }
    }

    function openCustomDetailsModal(id) {
        const req = cGlobalRequestsData[id];
        if(!req) return;
        document.getElementById('cModalTitle').innerText = `تفاصيل الاستفسار (${req.type})`;

    function handleImageUpload(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 600;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    currentImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('img-preview').style.display = 'block';
                    document.getElementById('preview-tag').src = currentImageBase64;
                    document.getElementById('img-label').innerText = "✅ تم تحميل الصورة";
                    document.getElementById('img-label').style.borderColor = "#10b981";
                    document.getElementById('img-label').style.color = "#10b981";
                };
            };
            reader.readAsDataURL(file);
        }
    }

    function toggleComments(requestId) {
        const section = document.getElementById(`comments-section-${requestId}`);
        const btn = document.getElementById(`comments-toggle-btn-${requestId}`);
        if (!section || !btn) return;
        if (section.classList.contains('open')) {

            btn.classList.remove('active');
            btn.innerHTML = `💬 التعليقات (${section.dataset.count || 0})`;
        } else {
            section.classList.add('open');
            btn.classList.add('active');
            btn.innerHTML = `🔽 إخفاء التعليقات (${section.dataset.count || 0})`;
        }
    }

        const container = document.getElementById('service-content');
        container.innerHTML = "<p style='text-align:center; color:#64748b; font-weight:600;'>جاري تحميل الطلبات...</p>";
        try {

            const data = await response.json();
            if (!data) { container.innerHTML = "<p style='text-align:center; color:#64748b; padding:25px;'>لا توجد طلبات حالياً.</p>"; return; }
            let html = '<div class="info-list">';
            Object.keys(data).reverse().forEach(key => {
                const req = data[key];
                const comments = req.comments || [];
                const commentsCount = comments.length;
                let commentsHtml = '';
                if (commentsCount > 0) {
                    commentsHtml = `
                        <div class="comment-section" id="comments-section-${key}" data-count="${commentsCount}">
                            ${comments.map((c, idx) => `
                                <div class="comment-item">
                                    <div class="comment-header">
                                        <div>
                                            <span class="comment-name">${c.name}</span>
                                            <span class="comment-time">${new Date(c.time).toLocaleString('ar-EG')}</span>

                                            <button class="delete-btn" onclick="deleteComment('${key}', ${idx})" title="حذف التعليق">🗑️</button>
                                        </div>
                                    </div>
                                    <div class="comment-text">${c.text}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                const addCommentHtml = `
                    <div class="add-comment-box">
                        <div class="comment-input-row">
                            <input type="text" id="comment-name-${key}" placeholder="اسمك">
                            <input type="text" id="comment-text-${key}" placeholder="اكتب تعليقك...">
                        </div>

                const toggleBtnHtml = `

                    </button>
                `;

                const hasPhone = req.phone && req.phone !== 'غير متوفر';
                const hasWhatsapp = req.whatsapp && req.whatsapp !== 'غير متوفر';

                html += `
                    <div class="service-card">
                        <div class="service-header">
                            <span class="service-name">👤 ${req.name}</span>
                            <span class="service-type">${req.serviceType}</span>
                        </div>
                        <div class="service-details details-text">📝 ${req.details || 'لم يتم إضافة تفاصيل'}</div>
                        <div class="service-details">📍 ${req.address}</div>
                        <div class="service-details">📞 هاتف: ${req.phone || 'غير متوفر'}</div>
                        <div class="service-details">💬 واتساب: ${req.whatsapp || 'غير متوفر'}</div>
                        <div class="service-time">🕒 ${new Date(req.timestamp).toLocaleString('ar-EG')}</div>
                        <div class="action-btns" style="margin-top:12px;">
                            ${hasPhone ? `<a href="tel:${req.phone}" class="btn-call" style="flex:1;">📞 اتصال</a>` : ''}
                            ${hasWhatsapp ? `<a href="https://wa.me/${req.whatsapp.replace('+', '')}?text=مرحباً، أرغب في تقديم الخدمة التي طلبتها (${req.serviceType})" target="_blank" class="btn-whatsapp" style="flex:1;">💬 واتساب</a>` : ''}
                            ${!hasPhone && !hasWhatsapp ? '<span style="color:#94a3b8; font-size:0.85rem;">لا توجد وسيلة اتصال متاحة</span>' : ''}
                            <button onclick="deleteServiceRequest('${key}', '${req.pin}')" style="background:#ef4444; color:white; border:none; padding:12px; border-radius:14px; flex:0.35; font-weight:700; cursor:pointer; font-size:0.88rem;">🗑️ حذف</button>
                        </div>
                        ${toggleBtnHtml}
                        ${commentsHtml}
                        ${addCommentHtml}
                    </div>
                `;
            });
            container.innerHTML = html + '</div>';
        } catch (e) {
            container.innerHTML = "<p style='text-align:center; color:red;'>حدث خطأ أثناء تحميل الطلبات.</p>";
            console.error(e);
        }

    async function saveServiceRequest() {
        const name = document.getElementById('service-name').value.trim();
        const serviceType = document.getElementById('service-type').value;
        const phone = document.getElementById('service-phone').value.trim();
        const whatsapp = document.getElementById('service-whatsapp').value.trim();
        const address = document.getElementById('service-address').value.trim();
        const details = document.getElementById('service-details').value.trim();
        const pin = document.getElementById('service-pin').value.trim();

        if (!name || !serviceType || !address || !pin) {
            showAlert("يرجى ملء الحقول المطلوبة (الاسم، نوع الخدمة، العنوان، الرقم السري)", "warning");
            return;
        }
        if (phone && !/^[\d\+]+$/.test(phone)) {
            showAlert("رقم الهاتف يجب أن يحتوي على أرقام فقط (ورمز + اختيارياً)", "warning");
            return;
        }
        if (whatsapp && !/^[\d\+]+$/.test(whatsapp)) {
            showAlert("رقم الواتساب يجب أن يحتوي على أرقام فقط (ورمز + اختيارياً)", "warning");
            return;
        }

        const data = {
            name: name,
            serviceType: serviceType,
            phone: phone || 'غير متوفر',
            whatsapp: whatsapp || 'غير متوفر',
            address: address,
            details: details || 'لم يتم إضافة تفاصيل',
            pin: pin,
            timestamp: Date.now(),
            comments: []
        };

        try {
            await fetch(SERVICE_REQUESTS_URL, { method: 'POST', body: JSON.stringify(data) });
            showAlert("✅ تم إرسال طلب الخدمة بنجاح!", "success");
            renderServiceRequests();
        } catch (e) {
            showAlert("❌ فشل الإرسال، حاول مرة أخرى", "error");
            console.error(e);
        }
    }

    async function deleteServiceRequest(id, correctPin) {

            showAlert("الرقم السري غير صحيح!", "error");

    // ===== دوال التعليقات =====
    async function addComment(requestId) {
        const nameInput = document.getElementById(`comment-name-${requestId}`);
        const textInput = document.getElementById(`comment-text-${requestId}`);
        const pinInput = document.getElementById(`comment-pin-${requestId}`);
        const name = nameInput.value.trim();
        const text = textInput.value.trim();
        const pin = pinInput.value.trim();

        if (!name || !text || !pin) {
            showAlert("يرجى ملء جميع الحقول (الاسم، النص، كلمة السر)", "warning");
            return;
        }
        if (pin.length < 4) {
            showAlert("كلمة السر يجب أن تكون 4 أحرف على الأقل", "warning");
            return;
        }

        try {
            const res = await fetch(FIREBASE_BASE_URL + `service_requests/${requestId}.json`);
            const req = await res.json();
            if (!req) { showAlert("الطلب غير موجود", "error"); return; }
            const comments = req.comments || [];
            comments.push({ name: name, text: text, pin: pin, time: Date.now() });
            await fetch(FIREBASE_BASE_URL + `service_requests/${requestId}.json`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ comments: comments })
            });
            nameInput.value = '';
            textInput.value = '';
            pinInput.value = '';
            showAlert("✅ تم إضافة تعليقك بنجاح", "success");
            renderServiceRequests();
        } catch (e) {
            showAlert("فشل إضافة التعليق", "error");
            console.error(e);
        }
    }

    async function editComment(requestId, commentIndex) {
        try {
            const res = await fetch(FIREBASE_BASE_URL + `service_requests/${requestId}.json`);
            const req = await res.json();
            if (!req) { showAlert("الطلب غير موجود", "error"); return; }
            const comments = req.comments || [];
            if (commentIndex < 0 || commentIndex >= comments.length) {
                showAlert("التعليق غير موجود", "error");
                return;
            }
            const comment = comments[commentIndex];

            const { value: pin } = await Swal.fire({
                title: 'منصة أم ضوابان الإلكترونية',
                text: 'أدخل كلمة السر لتعديل هذا التعليق:',
                input: 'password',
                inputPlaceholder: 'كلمة السر',
                showCancelButton: true,
                confirmButtonText: 'تعديل',
                cancelButtonText: 'إلغاء',
            });
            if (pin === null) return;
            if (pin !== comment.pin) {
                showAlert("❌ كلمة السر غير صحيحة!", "error");
                return;
            }

            const { value: newText } = await Swal.fire({
                title: 'منصة أم ضوابان الإلكترونية',
                text: 'قم بتعديل نص التعليق:',
                input: 'text',
                inputValue: comment.text,
                inputPlaceholder: 'نص التعليق الجديد',
                showCancelButton: true,
                confirmButtonText: 'حفظ التعديل',
                cancelButtonText: 'إلغاء',
            });
            if (newText === null) return;
            if (!newText.trim()) {
                showAlert("يرجى كتابة نص صحيح", "warning");
                return;
            }

            comments[commentIndex].text = newText.trim();
            await fetch(FIREBASE_BASE_URL + `service_requests/${requestId}.json`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ comments: comments })
            });
            showAlert("✅ تم تعديل التعليق بنجاح", "success");
            renderServiceRequests();
        } catch (e) {
            showAlert("فشل تعديل التعليق", "error");
            console.error(e);
        }
    }

    async function deleteComment(requestId, commentIndex) {
        try {
            const res = await fetch(FIREBASE_BASE_URL + `service_requests/${requestId}.json`);
            const req = await res.json();
            if (!req) { showAlert("الطلب غير موجود", "error"); return; }
            const comments = req.comments || [];
            if (commentIndex < 0 || commentIndex >= comments.length) {
                showAlert("التعليق غير موجود", "error");
                return;
            }
            const comment = comments[commentIndex];

            const { value: pin } = await Swal.fire({
                title: 'منصة أم ضوابان الإلكترونية',
                text: 'أدخل كلمة السر لحذف هذا التعليق:',
                input: 'password',
                inputPlaceholder: 'كلمة السر',
                showCancelButton: true,
                confirmButtonText: 'حذف',
                cancelButtonText: 'إلغاء',
            });
            if (pin === null) return;
            if (pin !== comment.pin) {
                showAlert("❌ كلمة السر غير صحيحة!", "error");
                return;
            }

            const confirmResult = await showConfirm("هل أنت متأكد من حذف هذا التعليق نهائياً؟");
            if (!confirmResult.isConfirmed) return;

            comments.splice(commentIndex, 1);
            await fetch(FIREBASE_BASE_URL + `service_requests/${requestId}.json`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ comments: comments })
            });
            showAlert("✅ تم حذف التعليق بنجاح", "success");
            renderServiceRequests();
        } catch (e) {
            showAlert("فشل حذف التعليق", "error");
            console.error(e);
        }
    }

    async function handleRideLogin(isLogin) {
        const username = document.getElementById('ride-login-user').value.trim().toLowerCase();
        const password = document.getElementById('ride-login-pass').value.trim();
        if (!username || !password) {
            showAlert("يرجى ملء جميع الحقول", "warning");
            return;
        }
        try {
            const response = await fetch(RIDE_USERS_URL);
            const users = await response.json() || {};
            if (isLogin) {
                if (users[username] && users[username].password === password) {
                    currentRideUser = username;
                    localStorage.setItem('rideUsername', username);
                    renderRideDashboard();
                } else {
                    showAlert("❌ اسم المستخدم أو كلمة السر غير صحيحة", "error");
                }
            } else {
                if (users[username]) {
                    showAlert("⚠️ هذا الاسم مستخدم بالفعل، اختر اسماً آخر", "warning");
                    return;
                }
                const newUser = { password: password, createdAt: Date.now() };
                await fetch(RIDE_USERS_URL, {
                    method: 'PATCH',
                    body: JSON.stringify({ [username]: newUser })
                });
                currentRideUser = username;
                localStorage.setItem('rideUsername', username);
                showAlert("🎉 تم إنشاء الحساب بنجاح", "success");
                renderRideDashboard();
            }
        } catch (e) {
            showAlert("خطأ في الاتصال بقاعدة البيانات", "error");
        }
    }

    async function submitRideRequest(type) {
        if (!currentRideUser) {
            showAlert("يرجى تسجيل الدخول أولاً", "warning");
            return;
        }
        let data = { userId: currentRideUser, type: type, status: 'pending', timestamp: Date.now() };
        if (type === 'ride') {
            const from = document.getElementById('ride-from').value.trim();
            const to = document.getElementById('ride-to').value.trim();
            if (!from || !to) { showAlert("يرجى تحديد مكان الانطلاق والوصول", "warning"); return; }
            data.from = from; data.to = to;
        } else {
            const pickup = document.getElementById('delivery-pickup').value.trim();
            const dropoff = document.getElementById('delivery-dropoff').value.trim();
            if (!pickup || !dropoff) { showAlert("يرجى تحديد مكان التسلم والتسليم", "warning"); return; }
            data.pickup = pickup; data.dropoff = dropoff;
            data.desc = document.getElementById('delivery-desc').value.trim();
        }
        try {
            await fetch(RIDE_REQUESTS_URL, { method: 'POST', body: JSON.stringify(data) });
            showAlert("✅ تم إرسال طلبك بنجاح، في انتظار قبول الكابتن", "success");
            document.getElementById('ride-form-container').innerHTML = '';
            loadUserRideRequests();
        } catch (e) {
            showAlert("❌ فشل الإرسال، حاول مرة أخرى", "error");
        }
    }

    // ===== دالة تحميل طلبات العميل مع معالجة فورية للإشعارات =====
    async function loadUserRideRequests() {
        const container = document.getElementById('ride-user-requests');
        if (!container) return;
        try {
            const response = await fetch(RIDE_REQUESTS_URL);
            const requests = await response.json() || {};
            
            // ===== معالجة الإشعارات فوراً =====
            const notificationsToClear = [];
            for (let key of Object.keys(requests)) {
                const req = requests[key];
                if (req.userId === currentRideUser && req.unfitNotification) {
                    // عرض الإشعار للعميل فوراً
                    await showAlert(req.unfitNotification.message, 'warning');
                    notificationsToClear.push(key);
                    
                    // إغلاق نافذة المحادثة إذا كانت مفتوحة لهذا الطلب
                    const chatBox = document.getElementById(`chat-box-${key}`);
                    if (chatBox) {
                        chatBox.style.display = 'none';
                        if (window.chatIntervals && window.chatIntervals[key]) {
                            clearInterval(window.chatIntervals[key]);
                            delete window.chatIntervals[key];
                        }
                    }
                }
            }
            // حذف الإشعارات من قاعدة البيانات بعد عرضها
            for (let key of notificationsToClear) {
                await fetch(RIDE_DB_URL + `ride_requests/${key}/unfitNotification.json`, {
                    method: 'DELETE'
                });
                // إعادة تحميل فوري للقائمة بعد حذف الإشعار
            }
            
            // ===== متابعة عرض الطلبات =====
            let html = '';
            let found = false;
            const keys = Object.keys(requests).reverse();
            for (let key of keys) {
                const req = requests[key];
                if (req.userId === currentRideUser) {
                    found = true;
                    const typeLabel = req.type === 'ride' ? '🚗 مشوار' : '📦 توصيل';
                    const statusMap = {
                        'pending': '⏳ قيد الانتظار',
                        'accepted': '✅ تم القبول',
                        'waiting_confirmation': '⏳ في انتظار تأكيدك',
                        'completed': '✔️ مكتمل'
                    };
                    const statusText = statusMap[req.status] || req.status;
                    let details = '';
                    if (req.type === 'ride') details = `من: ${req.from} → إلى: ${req.to}`;
                    else {
                        details = `تسلم: ${req.pickup} → تسليم: ${req.dropoff}`;
                        if (req.desc) details += ` (${req.desc})`;
                    }
                    let captainDisplay = '';
                    if (req.status === 'accepted' && req.captainFullName) {
                        captainDisplay = `<div style="color:#10b981; font-weight:bold; font-size:0.9rem;">🚕 الكابتن: ${req.captainFullName}</div>`;
                    }
                    if (req.status === 'waiting_confirmation' && req.captainFullName) {
                        captainDisplay = `<div style="color:#f59e0b; font-weight:bold; font-size:0.9rem;">🚕 الكابتن: ${req.captainFullName} (بانتظار تأكيدك)</div>`;
                    }
                    let cancelBtn = '';
                    if (req.status === 'pending' || req.status === 'accepted') {
                        cancelBtn = `<button onclick="cancelRideRequest('${key}')" style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.8rem;">🗑️ إلغاء الطلب</button>`;
                    }
                    let deleteCompletedBtn = '';
                    if (req.status === 'completed') {
                        deleteCompletedBtn = `<button onclick="deleteCompletedRequest('${key}')" style="background:#6b7280; color:white; border:none; padding:6px 12px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.8rem;">🗑️ حذف</button>`;
                    }
                    let confirmCompletionBtn = '';
                    if (req.status === 'waiting_confirmation') {
                        confirmCompletionBtn = `
                            <div style="background:#fef3c7; padding:10px; border-radius:10px; margin-top:8px; border-right:4px solid #f59e0b;">
                                <p style="margin:0 0 8px 0; font-weight:bold; color:#b45309;">❓ هل تم تنفيذ الطلب بالفعل؟</p>
                                <div style="display:flex; gap:8px;">
                                    <button onclick="confirmCompletion('${key}', true)" style="flex:1; background:#10b981; color:white; border:none; padding:8px; border-radius:8px; font-weight:bold; cursor:pointer;">✅ نعم</button>
                                    <button onclick="confirmCompletion('${key}', false)" style="flex:1; background:#ef4444; color:white; border:none; padding:8px; border-radius:8px; font-weight:bold; cursor:pointer;">❌ لا</button>
                                </div>
                            </div>
                        `;
                    }
                    const hasNewMsg = req.messages && req.messages.length > 0 && req.messages[req.messages.length-1].sender !== currentRideUser;
                    const newMsgAlert = hasNewMsg ? `<span class="new-msg-alert">🔴 جديد</span>` : '';

                    html += `
                        <div style="background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:12px; margin-bottom:10px;">
                            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                                <span style="font-weight:bold;">${typeLabel}</span>
                                <span style="background:#f1f5f9; padding:2px 10px; border-radius:20px; font-size:0.8rem;">${statusText}</span>
                            </div>
                            <div style="font-size:0.9rem; color:#475569;">${details}</div>
                            ${captainDisplay}
                            <div style="font-size:0.7rem; color:#94a3b8;">${new Date(req.timestamp).toLocaleString('ar-EG')}</div>
                            ${confirmCompletionBtn}
                            <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; align-items:center;">
                                ${cancelBtn}
                                ${deleteCompletedBtn}
                                ${(req.status === 'accepted' || req.status === 'waiting_confirmation') ? `<button onclick="openChatWindow('${key}')" style="background:#2563eb; color:white; border:none; padding:6px 12px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.8rem; display:flex; align-items:center; gap:4px;">💬 محادثة ${newMsgAlert}</button>` : ''}
                            </div>
                            <div id="chat-box-${key}" style="display:none; margin-top:10px; border-top:1px solid #e2e8f0; padding-top:10px;">
                                <div id="chat-messages-${key}" style="max-height:150px; overflow-y:auto; background:#f8fafc; border-radius:10px; padding:10px; margin-bottom:8px; font-size:0.85rem;"></div>
                                <div style="display:flex; gap:8px;">
                                    <input type="text" id="chat-input-${key}" placeholder="اكتب رسالتك..." style="flex:1; padding:8px 12px; border:1px solid #e2e8f0; border-radius:10px; font-size:0.85rem;">
                                    <button onclick="sendClientMessage('${key}')" style="background:#10b981; color:white; border:none; padding:8px 16px; border-radius:10px; font-weight:bold; cursor:pointer;">إرسال</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            if (!found) html = '<p style="color:#94a3b8; text-align:center;">لا توجد طلبات سابقة</p>';
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = '<p style="color:red;">خطأ في تحميل الطلبات</p>';
            console.error(e);
        }
    }

    function openChatWindow(requestId) {
        const chatBox = document.getElementById(`chat-box-${requestId}`);
        if (chatBox) {
            if (chatBox.style.display === 'none') {
                chatBox.style.display = 'block';
                if (rideRefreshInterval) {
                    clearInterval(rideRefreshInterval);
                    rideRefreshInterval = null;
                }
                loadClientMessages(requestId);
                if (!window.chatIntervals) window.chatIntervals = {};
                if (window.chatIntervals[requestId]) clearInterval(window.chatIntervals[requestId]);
                window.chatIntervals[requestId] = setInterval(() => {
                    loadClientMessages(requestId);
                }, 3000);
                setTimeout(() => {
                    const input = document.getElementById(`chat-input-${requestId}`);
                    if (input) input.focus();
                }, 100);
            } else {
                chatBox.style.display = 'none';
                if (window.chatIntervals && window.chatIntervals[requestId]) {
                    clearInterval(window.chatIntervals[requestId]);
                    delete window.chatIntervals[requestId];
                }
                if (!rideRefreshInterval) {
                    rideRefreshInterval = setInterval(() => {
                        if (document.getElementById('ride-content') && currentRideUser) {
                            loadUserRideRequests();
                        }
                    }, 500);
                }
            }
        }
    }

    async function loadClientMessages(requestId) {
        try {
            const res = await fetch(RIDE_DB_URL + `ride_requests/${requestId}.json`);
            const req = await res.json();
            const messages = req.messages || [];
            const container = document.getElementById(`chat-messages-${requestId}`);
            if (!container) return;
            if (messages.length === 0) {
                container.innerHTML = '<p style="color:#94a3b8; text-align:center; font-size:0.8rem;">لا توجد رسائل بعد</p>';
                return;
            }
            let html = '';
            messages.forEach(msg => {
                const isMine = msg.sender === currentRideUser;
                html += `<div style="text-align:${isMine ? 'left' : 'right'}; margin-bottom:4px;">
                            <div class="${isMine ? 'chat-bubble-mine' : 'chat-bubble-other'}">
                                <strong style="font-size:0.7rem; color:#475569;">${msg.sender}</strong><br>
                                <span style="font-size:0.85rem;">${msg.text}</span>
                                <span style="font-size:0.6rem; color:#94a3b8; margin-right:8px;">${new Date(msg.time).toLocaleTimeString('ar-EG')}</span>
                            </div>
                            <div class="chat-clear"></div>
                        </div>`;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        } catch (e) { console.error(e); }
    }

    async function sendClientMessage(requestId) {
        const input = document.getElementById(`chat-input-${requestId}`);
        if (!input) return;
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        try {
            const res = await fetch(RIDE_DB_URL + `ride_requests/${requestId}.json`);
            const req = await res.json();
            const messages = req.messages || [];
            messages.push({ sender: currentRideUser, text: text, time: Date.now() });
            await fetch(RIDE_DB_URL + `ride_requests/${requestId}.json`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: messages })
            });
            loadClientMessages(requestId);
            setTimeout(() => { if (input) input.focus(); }, 50);
        } catch (e) {
            showAlert("فشل إرسال الرسالة", "error");
            console.error(e);
        }
    }

    async function cancelRideRequest(requestId) {
        const result = await showConfirm("هل أنت متأكد من إلغاء هذا الطلب نهائياً؟");
        if (!result.isConfirmed) return;
        try {
            await fetch(RIDE_DB_URL + `ride_requests/${requestId}.json`, { method: 'DELETE' });
            showAlert("✅ تم إلغاء الطلب وحذفه نهائياً", "success");
            loadUserRideRequests();
        } catch (e) {
            showAlert("فشل الإلغاء", "error");
            console.error(e);
        }
    }

    async function deleteCompletedRequest(requestId) {
        const result = await showConfirm("هل أنت متأكد من حذف هذا الطلب المكتمل نهائياً؟");
        if (!result.isConfirmed) return;
        try {
            await fetch(RIDE_DB_URL + `ride_requests/${requestId}.json`, { method: 'DELETE' });
            showAlert("✅ تم حذف الطلب المكتمل بنجاح", "success");
            loadUserRideRequests();
        } catch (e) {
            showAlert("فشل الحذف", "error");
            console.error(e);
        }
    }

    async function confirmCompletion(requestId, confirmed) {
        try {
            const res = await fetch(RIDE_DB_URL + `ride_requests/${requestId}.json`);
            const req = await res.json();
            if (!req) return;
            if (confirmed) {
                await fetch(RIDE_DB_URL + `ride_requests/${requestId}.json`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'completed' })
                });
                showAlert("✅ تم تأكيد إتمام الطلب بنجاح! شكراً لك.", "success");
            } else {
                const rejectedBy = req.rejectedBy || {};
                rejectedBy[req.captainName] = true;
                await fetch(RIDE_DB_URL + `ride_requests/${requestId}.json`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        status: 'pending',
                        captainName: null,
                        captainFullName: null,
                        rejectedBy: rejectedBy
                    })
                });
                showAlert("⚠️ تم إلغاء الإنهاء، سيعود الطلب للكباتن الآخرين.", "warning");
            }
            loadUserRideRequests();
        } catch (e) {
            showAlert("فشل تحديث حالة الطلب", "error");
            console.error(e);
        }
    }

    function logoutRideUser() {
        localStorage.removeItem('rideUsername');
        currentRideUser = null;
        if (rideRefreshInterval) { clearInterval(rideRefreshInterval); rideRefreshInterval = null; }
        if (window.chatIntervals) {
            Object.values(window.chatIntervals).forEach(clearInterval);
            window.chatIntervals = {};
        }
        renderRideLogin();
    }

    // ===== دوال عامة =====
    function displayModal(title, html) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerHTML = html;
        document.querySelector('.modal-content').scrollTop = 0;
        document.getElementById('modalOverlay').classList.add('active');
        document.body.style.overflow = 'hidden';
        window.history.pushState({ modalOpen: true }, "");
    }

    function closeDetails() {
        const modal = document.getElementById('modalOverlay');
        if (modal.classList.contains('active')) {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
            if (window.history.state && window.history.state.modalOpen) window.history.back();
        }
    }

    window.addEventListener('popstate', function(event) {
        const modal = document.getElementById('modalOverlay');
        if (modal.classList.contains('active')) {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    });

    document.addEventListener("DOMContentLoaded", () => {
        initFuelStations();
        updateStatsSummary();
        setInterval(updateStatsSummary, 45000);
    });
</script>
